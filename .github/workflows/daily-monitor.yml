name: 일일 채용공고 점검

on:
  schedule:
    # UTC 기준 — 한국시간 09:00, 15:00
    - cron: "0 0 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: 공고 크롤링 (74개교 + 교육지원청)
        run: node scripts/monitor_seongnam_school_sites.mjs --lookback-days=14

      - name: 알림 발송 (Secrets 설정 시에만)
        if: ${{ vars.NOTIFY_ENABLED != 'false' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          if [ -n "$TELEGRAM_BOT_TOKEN" ] || [ -n "$SMTP_USER" ]; then
            python scripts/notify.py
          else
            echo "Secrets 미설정 — 알림 생략 (데이터 갱신만 수행)"
          fi

      - name: 갱신된 데이터 커밋
        run: |
          git config user.name "survival-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/school_notice_hits.json data/school_notice_new.json data/school_notice_state.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "데이터 갱신: $(date +'%Y-%m-%d %H:%M' -d '+9 hours') KST"
            git push
          fi
